seed: 42

data:
  root: data/processed/sen1floods11
  s1_subdir: S1Hand
  label_subdir: LabelHand
  split_dir: data/splits/official
  image_size: 512
  num_workers: 4
  vv_clip: [-23.0, 0.0]
  vh_clip: [-28.0, -5.0]
  ratio_clip: [0.0, 15.0]

model:
  arch: deeplabv3plus
  backbone: resnet34
  pretrained: true
  in_channels: 3
  out_classes: 1

training:
  batch_size: 2
  accumulate_grad_batches: 4
  precision: 16-mixed
  epochs: 50
  lr: 0.0003
  optimizer: adam
  loss: dice_bce
  pos_weight: null
  device: cuda
  checkpoint_dir: models

mlflow:
  tracking_uri: sqlite:///mlflow.db
  artifact_location: mlruns
  experiment: flood-water-seg

inference:
  checkpoint: models/best.ckpt
  threshold: 0.5
  tile_size: 512
  tile_overlap: 64
