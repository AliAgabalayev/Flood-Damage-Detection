seed: 42

data:
  root: data/processed/sen1floods11
  s1_subdir: S1Hand
  label_subdir: LabelHand
  split_dir: data/splits/official
  image_size: 512
  num_workers: 4
  vv_clip: [-25.0, 0.0]    # all 446 chips: p1=-24.30, p99=-2.40
  vh_clip: [-35.0, 0.0]    # all 446 chips: p1=-34.48, p99=-9.54
  ratio_clip: [0.0, 18.0]  # all 446 chips: p1=-0.36,  p99=17.33
  augment: true

model:
  arch: deeplabv3plus
  backbone: resnet50
  pretrained: true
  in_channels: 3
  out_classes: 1

training:
  batch_size: 2
  accumulate_grad_batches: 4
  precision: 16-mixed
  epochs: 50
  lr: 0.0003
  optimizer: adam
  loss: dice
  pos_weight: null
  device: cuda
  checkpoint_dir: models

mlflow:
  tracking_uri: sqlite:///mlflow.db
  artifact_location: mlruns
  experiment: flood-water-seg

inference:
  checkpoint: models/best.ckpt
  threshold: 0.5
  tile_size: 512
  tile_overlap: 64
  permanent_water:
    gsw_dir: data/reference/jrc_gsw/occurrence
    occurrence_threshold: 50
  layover_shadow:
    dem_dir: data/reference/copernicus_dem
    orbit_pass: ASCENDING   # approximation: S1 IW right-looking, ascending -> look east
    near_incidence_deg: 29.1
    far_incidence_deg: 46.0